name: release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0, 1.2.0b1, 1.2.0rc1)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          ref: 'release'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.2"

      - name: Bump version files
        run: uvx bump-my-version bump --new-version ${{ inputs.version }}

      - name: Draft changelog (captured for GitHub release body)
        run: uv run towncrier build --draft --version ${{ inputs.version }} > release_notes.rst

      - name: Build changelog
        run: uv run towncrier build --yes --version ${{ inputs.version }}

      - name: Commit, tag, and push release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B release
          git add --all
          git commit -m "Release ${{ inputs.version }}"
          git tag ${{ inputs.version }}
          git push origin release --force
          git push origin ${{ inputs.version }}

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.rst

  build-wheels:
    needs: prepare
    name: Build wheels (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Set up Python
        if: matrix.os != 'ubuntu-latest'
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13
            3.14
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist --interpreter 3.12 3.13 3.14
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.2"

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          bodyFile: release_notes.rst
          artifacts: dist/*
          makeLatest: true
